<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
  <div class="container-fluid">
    <a class="navbar-brand" href="/">MyTodo</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarSupportedContent">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link active" aria-current="page" href="/">Home</a>
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/">About</a>  
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
       
      </ul>
      <form class="d-flex" role="search">
        <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search"/>
        <button class="btn btn-outline-success" type="submit">Search</button>
      </form>
    </div>
  </div>
</nav>
    <div class="container">
        <h1>Add a Todos</h1>
        <form action="/" method="POST">
  <div class="mb-3">
    <label for="Title" class="form-label">Todo Title</label>
    <input type="text" class="form-control" name="title" id="Title" aria-describedby="emailHelp">
    
  </div>
  <div class="mb-3">
    <label for="desc" class="form-label">Todo discription</label>
    <input type="text" class="form-control" name="dsce"  id="desc">
  </div>
  
  <button type="submit" class="btn btn-primary">Submit</button>
</form>
</div>

<div class="container my-4">
    <h1>Your Todos</h1>
  
    {% if allTodo| length==0 %}
        <div class="alert alert-danger" role="alert">
  No Todo found PLz insert Todo!
</div> 
        {% else %}      
          <table class="table">
            <thead>
              <tr>
                <th scope="col">Sno</th>
                <th scope="col">Title</th>
                <th scope="col">Dsce</th>
                <th scope="col">Date_created</th>
                <th scope="col">Actions</th>

              </tr>
            </thead>
            <tbody>
    {% for Todo in allTodo  %}
       <tr>
      <th scope="row">{{loop.index}}</th>
      <td>{{Todo.title}}</td>
      <td>{{Todo.dsce}}</td>
      <td>@{{Todo.Date_created}}</td>
      <td>
        <a href="/update/{{Todo.sno}}" type="button " class=" btn btn-outline-dark btn-sm mx-1">Update</button>
        <a href="/delete/{{Todo.sno}}" type="button " class=" btn btn-outline-dark btn-sm mx-1">Delete</button>

      </td>
    </tr>
    </tbody>
</table>
    {% endfor %}
    {% endif %}
  

</div>
        
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
